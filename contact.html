<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Clear Skin 24/7</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f7f6f4;
  color:#222;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:#fff;
}

.logo{
  font-family:"Playfair Display";
  font-size:24px;
}

ul{
  display:flex;
  gap:20px;
  list-style:none;
}

a{
  text-decoration:none;
  color:#444;
}

/* HEADER */
.page-header{
  text-align:center;
  padding:60px 20px;
}

.page-header h2{
  font-size:40px;
  font-family:"Playfair Display";
}

/* LAYOUT */
.contact-wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
  padding:40px;
  flex-wrap:wrap;
}

/* LEFT SIDE */
.contact-info{
  max-width:300px;
}

.info-box{
  margin-bottom:20px;
}

.info-box h4{
  margin-bottom:5px;
}

/* FORM */
.contact-form-box{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.05);
  width:300px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#f1f1f1;
}

button{
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#333;
}

/* IMAGE SIDE */
.contact-image img{
  width:300px;
  border-radius:20px;
  animation:float 4s ease-in-out infinite;
}

/* FLOAT ANIMATION */
@keyframes float{
  0%{ transform:translateY(0px);}
  50%{ transform:translateY(-15px);}
  100%{ transform:translateY(0px);}
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:30px;
  margin-top:50px;
}
</style>
</head>

<body>

<nav>
<h1 class="logo">Clear Skin 24/7</h1>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<section class="page-header">
<h2>Contact Us</h2>
<p>Questions about skincare? We're here to help.</p>
</section>

<section class="contact-wrapper">

<!-- LEFT -->
<div class="contact-info">
<h3>Get In Touch</h3>

<div class="info-box">
<h4>Email</h4>
<p>support@clearskin247.com</p>
</div>

<div class="info-box">
<h4>Phone</h4>
<p>(800) 555-2048</p>
</div>

<div class="info-box">
<h4>Hours</h4>
<p>Monday - Friday: 9AM – 6PM</p>
</div>
</div>

<!-- FORM -->
<div class="contact-form-box">
<h3>Send A Message</h3>

<form>
<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email Address">
<textarea placeholder="Write your message..."></textarea>
<button type="submit">Submit</button>
</form>
</div>

<!-- IMAGE RIGHT -->
<div class="contact-image">
<img src="https://images.unsplash.com/photo-1596755389378-c31d21fd1273?q=80&w=800&auto=format&fit=crop">
</div>

</section>

<footer>
<p>© 2026 Clear Skin 24/7</p>
</footer>

</body>
</html>
