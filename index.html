<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlowSkin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <nav>
      <h1 class="logo">GlowSkin</h1>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#products">Products</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <div class="hero" id="home">
      <div class="hero-text">
        <h2>Healthy Skin Starts Here</h2>
        <p>Luxury skincare products made to hydrate, brighten, and refresh your skin every day.</p>
        <a href="#products" class="btn">Shop Now</a>
      </div>
    </div>
  </header>

  <section class="products" id="products">
    <h2>Best Sellers</h2>

    <div class="product-container">

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?q=80&w=800&auto=format&fit=crop" alt="Cleanser">
        <h3>Hydrating Cleanser</h3>
        <p>$24.99</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1612817288484-6f916006741a?q=80&w=800&auto=format&fit=crop" alt="Serum">
        <h3>Vitamin C Serum</h3>
        <p>$34.99</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1556228578-8c89e6adf883?q=80&w=800&auto=format&fit=crop" alt="Moisturizer">
        <h3>Daily Moisturizer</h3>
        <p>$29.99</p>
        <button>Add to Cart</button>
      </div>

    </div>
  </section>

  <section class="about" id="about">
    <div class="about-text">
      <h2>About GlowSkin</h2>
</html>
